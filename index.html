<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sala Chat</title>
    <style>
      body {
        font-family: Arial;
        max-width: 720px;
        margin: 24px auto;
        padding: 0 12px;
      }
      #messages {
        border: 1px solid #ddd;
        height: 320px;
        overflow-y: auto;
        padding: 10px;
        margin-bottom: 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      form {
        display: flex;
        gap: 8px;
      }
      input {
        flex: 1;
        padding: 10px;
      }
      button {
        padding: 10px 14px;
      }
      .msg {
        display: flex;
        width: 100%;
      }

      .msg.recebida {
        justify-content: flex-start;
      }
      .msg.enviada {
        justify-content: flex-end;
      }

      .card {
        max-width: 70%;
        padding: 10px 14px;
        border-radius: 12px;
        background: #f1f1f1;
        word-break: break-word;
      }

      .msg.enviada .card {
        background: #4fc7ff65;
      }
    </style>
  </head>
  <body>
    <h1>Chat</h1>

    <div id="messages"></div>

    <form id="form">
      <input id="text" placeholder="Digite..." required />
      <button type="submit">Enviar</button>
    </form>

    <script src="script.js"></script>
  </body>
</html>
